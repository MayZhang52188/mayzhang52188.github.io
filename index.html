<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医共体运营分析智能助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; }
        .container { max-width: 800px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #2F54EB; color: white; padding: 16px 24px; border-radius: 8px 8px 0 0; }
        .header h1 { font-size: 20px; font-weight: 500; }
        .chat-box { flex: 1; overflow-y: auto; padding: 24px; background: white; }
        .message { margin-bottom: 16px; max-width: 70%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; }
        .user-message { background: #2F54EB; color: white; margin-left: auto; }
        .bot-message { background: #f0f2f5; color: #333; margin-right: auto; }
        .input-area { display: flex; padding: 16px; background: white; border-top: 1px solid #e5e6eb; border-radius: 0 0 8px 8px; }
        #user-input { flex: 1; padding: 12px 16px; border: 1px solid #e5e6eb; border-radius: 24px; font-size: 14px; outline: none; }
        #send-btn { margin-left: 12px; padding: 12px 24px; background: #2F54EB; color: white; border: none; border-radius: 24px; cursor: pointer; }
        #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>医共体运营分析智能助手</h1>
        </div>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="请输入您的问题...">
            <button id="send-btn">发送</button>
        </div>
    </div>

    <script>
        const API_TOKEN = "pat_7yY8J9spevRMnERMicnoL1B1FsWhksS3YJQMIrHs29iOoEfTphfiBMe8c9jfW0oa";
        const BOT_ID = "7614002872627232795";
        const API_URL = "https://api.coze.cn/v3/chat";

        let conversationId = null;
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(content, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msgDiv.textContent = content;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            userInput.value = '';
            sendBtn.disabled = true;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bot_id: BOT_ID,
                        conversation_id: conversationId,
                        user_id: "user_001",
                        query: text,
                        stream: false
                    })
                });
                const data = await res.json();
                if (data.code !== 0) throw new Error(data.msg);
                conversationId = data.data.conversation_id;
                const answer = data.data.choices[0]?.content || "抱歉，我暂时无法回答您的问题。";
                addMessage(answer, false);
            } catch (err) {
                addMessage(`出错了：${err.message}`, false);
                console.error(err);
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        addMessage("您好，我是医共体运营分析智能助手，请问有什么可以帮您？", false);
    </script>
</body>
</html>
